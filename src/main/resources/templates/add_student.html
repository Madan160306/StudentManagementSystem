<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Student</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="col-md-6 offset-md-3">
            <div class="card shadow p-4">
                <h3 class="text-center text-success mb-4">Register Student</h3>
                <form th:action="@{/save}" th:object="${student}" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Admission Number</label>
                        <input type="number" th:field="*{adno}" class="form-control" placeholder="Enter Ad No" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="Enter Name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <input type="text" th:field="*{address}" class="form-control" placeholder="Enter City/Address">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Save Record</button>
                        <a th:href="@{/}" class="btn btn-outline-secondary">Back to List</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
