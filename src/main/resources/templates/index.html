<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Student Dashboard</h4>
                <a th:href="@{/addForm}" class="btn btn-light btn-sm">Add New Student</a>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Ad No</th>
                            <th>Name</th>
                            <th>Address</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${allStudents}">
                            <td th:text="${s.adno}"></td>
                            <td th:text="${s.name}"></td>
                            <td th:text="${s.address}"></td>
                            <td>
                                <a th:href="@{/edit/{adno}(adno=${s.adno})}" class="btn btn-warning btn-sm">Edit</a>
                                <a th:href="@{/delete/{adno}(adno=${s.adno})}" class="btn btn-danger btn-sm" 
                                   onclick="return confirm('Are you sure?')">Delete</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
